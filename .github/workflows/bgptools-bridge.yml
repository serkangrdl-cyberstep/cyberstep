name: CyberStep Lead Discovery (BGP.tools + Reverse DNS)

on:
  schedule:
    - cron: '15 1 * * *'   # Her gece 01:15 UTC (04:15 TR)
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Discover TR domains via BGP.tools ASN + PTR lookups
        run: |
          python3 - << 'PYEOF'
          import json, os, sys, time, subprocess
          import urllib.request

          REPLIT_URL = os.environ.get("REPLIT_INGEST_URL", "")
          SECRET     = os.environ.get("BRIDGE_SECRET", "")

          if not REPLIT_URL or not SECRET:
              print("ERROR: REPLIT_INGEST_URL veya BRIDGE_SECRET eksik", flush=True)
              sys.exit(1)

          UA = "CyberStep-Research/1.0 bgp.tools (contact@cyberstep.io)"

          SKIP_TLDS  = (".gov.tr", ".edu.tr", ".k12.tr", ".mil.tr", ".bel.tr", ".pol.tr")
          SKIP_HOSTS = {
              "cloudflare.com", "amazonaws.com", "azure.com", "google.com",
              "microsoft.com", "letsencrypt.org", "fastly.net", "akamai.net",
              "netlify.app", "vercel.app",
          }

          MAX_ASNS            = 40   # İlk 40 TR ASN
          MAX_PREFIXES_PER_ASN = 4
          MAX_IPS_TOTAL        = 400  # Toplam dig lookup sayısı

          def is_tr_lead(d: str) -> bool:
              d = d.lower()
              if any(d.endswith(s) for s in SKIP_TLDS): return False
              if any(h in d for h in SKIP_HOSTS): return False
              return d.endswith(".tr")

          def root_domain(d: str) -> str:
              parts = d.lower().split(".")
              if len(parts) >= 3 and parts[-1] == "tr":
                  return ".".join(parts[-3:])
              return ".".join(parts[-2:])

          def sample_ips(cidr: str, n: int = 4):
              try:
                  base, bits = cidr.split("/")
                  prefix_len = int(bits)
                  parts = list(map(int, base.split(".")))
                  host_bits = 32 - prefix_len
                  total = 2 ** host_bits
                  base_num = (parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]
                  count = min(n, max(1, total - 2))
                  ips = []
                  for i in range(count):
                      offset = int((i + 1) / (count + 1) * total)
                      ip_num = (base_num + offset) & 0xFFFFFFFF
                      ips.append(f"{(ip_num>>24)&0xFF}.{(ip_num>>16)&0xFF}.{(ip_num>>8)&0xFF}.{ip_num&0xFF}")
                  return ips
              except Exception:
                  return []

          def ptr_lookup(ip: str) -> str | None:
              try:
                  result = subprocess.run(
                      ["dig", "-x", ip, "+short", "+time=3", "+tries=1"],
                      capture_output=True, text=True, timeout=5,
                  )
                  hostname = result.stdout.strip().rstrip(".")
                  if hostname and "." in hostname:
                      return hostname.lower()
              except Exception:
                  pass
              return None

          def fetch_json(url: str) -> dict | list | None:
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": UA})
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"  HATA {url}: {e}", flush=True)
                  return None

          # ── 1. Türkiye ASN listesi ─────────────────────────────────────────────
          print("BGP.tools TR ASN listesi alınıyor...", flush=True)
          country_data = fetch_json("https://bgp.tools/country/TR.json")
          if not country_data or not isinstance(country_data, dict):
              print("ASN listesi alınamadı — çıkılıyor", flush=True)
              sys.exit(1)

          asns = country_data.get("asns", [])[:MAX_ASNS]
          print(f"{len(asns)} TR ASN alındı", flush=True)

          # ── 2. Her ASN için prefix listesi + IP örnekleme ─────────────────────
          all_ips: list[str] = []
          for asn_entry in asns:
              if len(all_ips) >= MAX_IPS_TOTAL:
                  break
              asn = asn_entry.get("asn") if isinstance(asn_entry, dict) else asn_entry
              if not asn:
                  continue
              asn_data = fetch_json(f"https://bgp.tools/as/{asn}.json")
              if not asn_data or not isinstance(asn_data, dict):
                  time.sleep(0.5)
                  continue

              prefixes = []
              if isinstance(asn_data.get("prefixes"), list):
                  prefixes = asn_data["prefixes"][:MAX_PREFIXES_PER_ASN]
              elif isinstance(asn_data.get("ipv4_prefixes"), list):
                  prefixes = [p.get("prefix") for p in asn_data["ipv4_prefixes"][:MAX_PREFIXES_PER_ASN] if p.get("prefix")]

              for pfx in prefixes:
                  if isinstance(pfx, str):
                      all_ips.extend(sample_ips(pfx, n=3))
                  if len(all_ips) >= MAX_IPS_TOTAL:
                      break
              time.sleep(0.2)

          print(f"{len(all_ips)} IP örneklendi — PTR sorguları başlıyor", flush=True)

          # ── 3. PTR (reverse DNS) sorguları — dig, rate limit yok ─────────────
          collected: set[str] = set()
          for idx, ip in enumerate(all_ips):
              hostname = ptr_lookup(ip)
              if hostname and is_tr_lead(hostname):
                  collected.add(root_domain(hostname))
              if idx > 0 and idx % 50 == 0:
                  print(f"  [{idx}/{len(all_ips)}] bulunan TR domain: {len(collected)}", flush=True)

          print(f"\nToplam: {len(collected)} benzersiz TR domain", flush=True)

          if not collected:
              print("TR domain bulunamadı — gönderilecek yok", flush=True)
              sys.exit(0)

          # ── 4. cert-ingest'e gönder ───────────────────────────────────────────
          domains = sorted(collected)
          print(f"Örnek: {domains[:5]}", flush=True)

          CHUNK = 500
          total_accepted = 0
          for i in range(0, len(domains), CHUNK):
              chunk = domains[i:i + CHUNK]
              payload = json.dumps({
                  "domains": chunk,
                  "secret": SECRET,
                  "source": "bgptools",
              }).encode()
              try:
                  req = urllib.request.Request(
                      REPLIT_URL, data=payload,
                      headers={"Content-Type": "application/json"}, method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = json.loads(resp.read())
                      accepted = body.get("accepted", 0)
                      total_accepted += accepted
                      print(f"  Batch {i // CHUNK + 1}: accepted={accepted} skipped={body.get('skipped')}", flush=True)
              except Exception as e:
                  print(f"  Batch {i // CHUNK + 1}: HATA {e}", flush=True)

          print(f"\n=== TAMAMLANDI: total_accepted={total_accepted} ===", flush=True)
          PYEOF
        env:
          REPLIT_INGEST_URL: ${{ secrets.REPLIT_INGEST_URL }}
          BRIDGE_SECRET: ${{ secrets.BRIDGE_SECRET }}
