name: CyberStep Lead Discovery (Certstream)

on:
  schedule:
    - cron: '0 * * * *'   # Saatlik
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Install dependencies
        run: pip install websockets

      - name: Download certstream-server-go and config
        run: |
          curl -fsSL \
            "https://github.com/d-Rickyy-b/certstream-server-go/releases/download/v1.9.0/certstream-server-go_1.9.0_linux_amd64" \
            -o certstream-server-go
          chmod +x certstream-server-go

          curl -fsSL \
            "https://raw.githubusercontent.com/d-Rickyy-b/certstream-server-go/master/config.sample.yaml" \
            -o config.yml

          echo "=== config.yml ==="
          cat config.yml
          echo "=== binary info ==="
          file certstream-server-go
          ls -lh certstream-server-go

      - name: Start certstream-server-go (with debug log)
        run: |
          # Stdout/stderr'i log dosyasına yönlendir
          ./certstream-server-go > certstream.log 2>&1 &
          echo "CERTSTREAM_PID=$!" >> $GITHUB_ENV
          echo "PID: $!"

          # Port 8080 açılana kadar bekle (max 240s — binary CT log catch-up yapar)
          for i in $(seq 1 240); do
            if nc -z localhost 8080 2>/dev/null; then
              echo "Port 8080 OPEN after ${i}s"
              break
            fi
            if [ $i -eq 30 ] || [ $i -eq 90 ] || [ $i -eq 150 ] || [ $i -eq 210 ]; then
              echo "--- certstream.log at ${i}s (last 3 lines) ---"
              tail -3 certstream.log 2>/dev/null || echo "(empty)"
              ps aux | grep certstream | grep -v grep | awk '{print "PID:",$2,"MEM:",$4}' || echo "(not running)"
            fi
            sleep 1
          done

          echo "=== Final certstream.log ==="
          cat certstream.log 2>/dev/null || echo "(no log)"
          echo "=== netstat ==="
          ss -tlnp | grep -E "8080|LISTEN" | head -10

          # CT log bağlantısı için ek bekleme
          sleep 15

      - name: Collect TR domains and send to Replit
        run: |
          echo "=== certstream.log at collection time ==="
          cat certstream.log 2>/dev/null | tail -20 || echo "(no log)"
          echo "=== port check ==="
          ss -tlnp | grep 8080 || echo "Port 8080 NOT open"

          python3 << 'PYEOF'
          import asyncio, json, os, sys, time
          import websockets
          import urllib.request

          REPLIT_URL = os.environ.get("REPLIT_INGEST_URL", "")
          SECRET     = os.environ.get("BRIDGE_SECRET", "")

          if not REPLIT_URL or not SECRET:
              print("ERROR: Missing REPLIT_INGEST_URL or BRIDGE_SECRET", flush=True)
              sys.exit(1)

          TR_TLDS = (
              ".com.tr", ".net.tr", ".org.tr", ".web.tr",
              ".biz.tr", ".info.tr", ".gen.tr", ".tv.tr", ".name.tr",
          )
          SKIP_TLDS = (".gov.tr", ".edu.tr", ".k12.tr", ".mil.tr", ".bel.tr", ".pol.tr")
          SKIP_HOSTS = {
              "cloudflare.com", "amazonaws.com", "azure.com",
              "google.com", "microsoft.com", "letsencrypt.org",
          }

          collected: set[str] = set()

          def is_tr_lead(d: str) -> bool:
              d = d.lower().lstrip("*.")
              if any(d.endswith(s) for s in SKIP_TLDS): return False
              if any(h in d for h in SKIP_HOSTS): return False
              return any(d.endswith(t) for t in TR_TLDS)

          def root_domain(d: str) -> str:
              parts = d.lower().lstrip("*.").split(".")
              if len(parts) >= 3 and parts[-1] == "tr":
                  return ".".join(parts[-3:])
              return ".".join(parts[-2:])

          WS_URL = "ws://localhost:8080/domains-only"
          COLLECT_SECONDS = 480  # 8 dakika

          async def collect():
              start = time.time()
              total_messages = 0
              print(f"Connecting to {WS_URL} ...", flush=True)

              try:
                  async with websockets.connect(
                      WS_URL,
                      ping_interval=30,
                      ping_timeout=10,
                      open_timeout=15,
                  ) as ws:
                      print("Connected! Collecting TR domains for 8 minutes...", flush=True)
                      first_msg_printed = False

                      while time.time() - start < COLLECT_SECONDS:
                          try:
                              msg = await asyncio.wait_for(ws.recv(), timeout=5.0)
                              total_messages += 1

                              # İlk mesajı debug için yazdır
                              if not first_msg_printed:
                                  first_msg_printed = True
                                  print(f"  First message (truncated): {msg[:300]}", flush=True)

                              data = json.loads(msg)
                              domains_in_msg = []
                              if isinstance(data, list):
                                  domains_in_msg = [d for d in data if isinstance(d, str)]
                              elif isinstance(data, dict):
                                  leaf = data.get("data", {}).get("leaf_cert", {})
                                  domains_in_msg = [d for d in leaf.get("all_domains", []) if isinstance(d, str)]

                              for d in domains_in_msg:
                                  if is_tr_lead(d):
                                      collected.add(root_domain(d))

                              if total_messages % 2000 == 0:
                                  elapsed = int(time.time() - start)
                                  print(f"  [{elapsed}s] messages={total_messages} TR={len(collected)}", flush=True)

                          except asyncio.TimeoutError:
                              continue
                          except Exception as e:
                              print(f"  recv error: {e}", flush=True)
                              break

              except Exception as e:
                  print(f"Connection error: {e}", flush=True)

              print(f"Done — messages={total_messages} TR domains={len(collected)}", flush=True)

          asyncio.run(collect())

          if not collected:
              print("No TR domains found — nothing to send", flush=True)
              sys.exit(0)

          domains = sorted(collected)
          print(f"Sample: {domains[:5]}", flush=True)
          CHUNK = 500
          total_accepted = 0

          for i in range(0, len(domains), CHUNK):
              chunk = domains[i:i + CHUNK]
              payload = json.dumps({
                  "domains": chunk,
                  "secret": SECRET,
                  "source": "ct_discovery",
              }).encode()
              try:
                  req = urllib.request.Request(
                      REPLIT_URL, data=payload,
                      headers={"Content-Type": "application/json"}, method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = json.loads(resp.read())
                      total_accepted += body.get("accepted", 0)
                      print(f"  Batch {i//CHUNK+1}: accepted={body.get('accepted')} skipped={body.get('skipped')}", flush=True)
              except Exception as e:
                  print(f"  Batch {i//CHUNK+1}: ERROR {e}", flush=True)

          print(f"=== DONE: total_accepted={total_accepted} ===", flush=True)
          PYEOF
        env:
          REPLIT_INGEST_URL: ${{ secrets.REPLIT_INGEST_URL }}
          BRIDGE_SECRET: ${{ secrets.BRIDGE_SECRET }}

      - name: Stop certstream-server-go
        if: always()
        run: |
          kill $CERTSTREAM_PID 2>/dev/null || true
          echo "=== certstream.log (final) ==="
          cat certstream.log 2>/dev/null || echo "(no log)"
