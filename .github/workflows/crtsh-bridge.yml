name: CyberStep Lead Discovery (crt.sh)

on:
  schedule:
    - cron: '30 2 * * *'   # Her gece 02:30 UTC (05:30 TR)
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Query crt.sh and ingest TR domains
        run: |
          python3 - << 'PYEOF'
          import json, os, sys, time
          import urllib.request, urllib.error

          REPLIT_URL = os.environ.get("REPLIT_INGEST_URL", "")
          SECRET     = os.environ.get("BRIDGE_SECRET", "")

          if not REPLIT_URL or not SECRET:
              print("ERROR: REPLIT_INGEST_URL veya BRIDGE_SECRET eksik", flush=True)
              sys.exit(1)

          # crt.sh wildcard sorguları
          # ÖNEMLİ: % karakterini urllib.parse.quote ile encode ETME.
          # quote("%.com.tr") → "%25.com.tr" yapar, crt.sh 404 döndürür.
          # Python f-string içinde doğrudan % bırakarak gönder.
          QUERIES = [
              "%.com.tr",
              "%.net.tr",
              "%.org.tr",
              "%.web.tr",
              "%.biz.tr",
              "%.info.tr",
              "%.gen.tr",
              "%.edu.tr",   # üniversiteler — sector=education olarak etiketlenir
          ]

          SKIP_TLDS  = (".gov.tr", ".k12.tr", ".mil.tr", ".bel.tr", ".pol.tr")
          SKIP_HOSTS = {
              "cloudflare.com", "amazonaws.com", "azure.com", "google.com",
              "microsoft.com", "letsencrypt.org", "fastly.net", "akamai.net",
              "netlify.app", "vercel.app", "github.io", "akamaitechnologies.com",
          }

          def is_tr_lead(d: str) -> bool:
              d = d.lower().lstrip("*.")
              if any(d.endswith(s) for s in SKIP_TLDS): return False
              if any(h in d for h in SKIP_HOSTS): return False
              return d.endswith(".tr")

          def root_domain(d: str) -> str:
              parts = d.lower().lstrip("*.").split(".")
              if len(parts) >= 3 and parts[-1] == "tr":
                  return ".".join(parts[-3:])
              return ".".join(parts[-2:])

          def extract_domains(cert: dict) -> set:
              domains: set[str] = set()
              cn = (cert.get("common_name") or "").lower().strip()
              if cn:
                  domains.add(cn)
              for line in (cert.get("name_value") or "").split("\n"):
                  line = line.strip().lower()
                  if line:
                      domains.add(line)
              return domains

          def crtsh_fetch(query: str) -> list:
              """crt.sh'den JSON sertifika listesi çek.
              % wildcard'ı URL encode ETME — f-string içinde olduğu gibi bırak.
              Kısa timeout + 2 retry — toplam budget ~90s/sorgu.
              """
              url = f"https://crt.sh/?q={query}&output=json&deduplicate=Y"
              headers = {
                  "User-Agent": "Mozilla/5.0 (compatible; CyberStep-Research/2.0)",
                  "Accept":     "application/json",
              }
              for attempt in range(1, 3):  # max 2 deneme
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req, timeout=40) as resp:
                          status = resp.status
                          raw = resp.read()
                          if not raw:
                              print(f"  [deneme {attempt}] Boş yanıt", flush=True)
                              time.sleep(5 * attempt)
                              continue
                          certs = json.loads(raw)
                          print(f"  HTTP {status} — {len(certs)} sertifika", flush=True)
                          return certs
                  except urllib.error.HTTPError as e:
                      print(f"  [deneme {attempt}] HTTP {e.code}: {e.reason}", flush=True)
                      time.sleep(5 * attempt)
                  except urllib.error.URLError as e:
                      print(f"  [deneme {attempt}] URL hatası: {e.reason}", flush=True)
                      time.sleep(5 * attempt)
                  except Exception as e:
                      print(f"  [deneme {attempt}] HATA: {e}", flush=True)
                      time.sleep(5 * attempt)
              return []

          collected: set[str] = set()

          for query in QUERIES:
              print(f"\n--- crt.sh: {query} ---", flush=True)
              certs = crtsh_fetch(query)
              if not certs:
                  print("  Veri alınamadı — sonraki sorguya geçiliyor", flush=True)
                  time.sleep(3)
                  continue

              before = len(collected)
              for cert in certs:
                  for d in extract_domains(cert):
                      if is_tr_lead(d):
                          collected.add(root_domain(d))

              added = len(collected) - before
              print(f"  +{added} yeni domain (toplam: {len(collected)})", flush=True)
              time.sleep(5)  # crt.sh rate limit

          print(f"\n=== Toplam {len(collected)} benzersiz TR domain ===", flush=True)

          if not collected:
              print("TR domain bulunamadı — gönderilecek bir şey yok", flush=True)
              sys.exit(0)

          domains = sorted(collected)
          print(f"Örnek: {domains[:5]}", flush=True)

          CHUNK = 500
          total_accepted = 0

          for i in range(0, len(domains), CHUNK):
              chunk = domains[i:i + CHUNK]
              payload = json.dumps({
                  "domains": chunk,
                  "secret": SECRET,
                  "source": "crtsh",
              }).encode()
              try:
                  req = urllib.request.Request(
                      REPLIT_URL, data=payload,
                      headers={"Content-Type": "application/json"}, method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = json.loads(resp.read())
                      accepted = body.get("accepted", 0)
                      total_accepted += accepted
                      print(
                          f"  Batch {i // CHUNK + 1}: accepted={accepted} skipped={body.get('skipped')}",
                          flush=True,
                      )
              except Exception as e:
                  print(f"  Batch {i // CHUNK + 1}: HATA {e}", flush=True)

          print(f"\n=== TAMAMLANDI: total_accepted={total_accepted} ===", flush=True)
          PYEOF
        env:
          REPLIT_INGEST_URL: ${{ secrets.REPLIT_INGEST_URL }}
          BRIDGE_SECRET: ${{ secrets.BRIDGE_SECRET }}
