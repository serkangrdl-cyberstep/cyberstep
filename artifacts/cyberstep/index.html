    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- JSON-LD: Organization — OWASP/W3C: @id ile cross-entity referans, foundingDate ile zengin snippet -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://cyberstep.io/#organization",
      "name": "CyberStep.io",
      "url": "https://cyberstep.io",
      "logo": {
        "@type": "ImageObject",
        "url": "https://cyberstep.io/favicon.svg",
        "width": 512,
        "height": 512
      },
      "description": "KOBİ'ler için siber güvenlik risk analizi ve danışmanlık hizmetleri.",
      "foundingDate": "2024",
      "areaServed": "TR",
      "knowsLanguage": ["tr", "en"],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://cyberstep.io/iletisim",
        "availableLanguage": ["Turkish", "English"]
      }
    }
    </script>

    <!-- JSON-LD: WebSite — publisher ile Organization'a bağlı -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://cyberstep.io/#website",
      "name": "CyberStep.io",
      "url": "https://cyberstep.io",
      "description": "KOBİ'ler için Türkçe siber güvenlik risk analizi platformu.",
      "publisher": { "@id": "https://cyberstep.io/#organization" },
      "inLanguage": ["tr", "en"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://cyberstep.io/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "CyberStep.io nedir?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CyberStep.io, Türkiye'deki KOBİ ve orta ölçekli işletmelere yönelik Türkçe siber güvenlik risk analizi platformudur. AI destekli değerlendirme, dış saldırı yüzeyi taraması ve KVKK uyum raporlaması sunar."
          }
        },
        {
          "@type": "Question",
          "name": "Mini Değerlendirme ücretsiz mi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Evet. 20 soruluk Mini Siber Güvenlik Değerlendirmesi tamamen ücretsizdir. Tamamlandığında AI destekli kişiselleştirilmiş risk raporu oluşturulur."
          }
        },

          "name": "Domain taraması ne kadar sürer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dış saldırı yüzeyi domain taraması genellikle 30-60 saniye içinde tamamlanır. SPF, DMARC, DKIM, SSL sertifikası ve açık port kontrollerini kapsar."
          }
        },
        {
          "@type": "Question",
          "name": "KVKK uyumu için ne yapmalıyım?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CyberStep.io, KVKK uyum değerlendirmesi modülü aracılığıyla kişisel veri envanteri, teknik ve idari tedbirler ile veri işleme faaliyetleri konusunda rehberlik sunar. Mini Değerlendirme ile başlayabilirsiniz."
          }
        },
        {
          "@type": "Question",
          "name": "Siber güvenlik değerlendirmesi raporu ne içerir?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI destekli rapor; genel risk skoru, 5 farklı güvenlik domaininde puan dağılımı, kritik açıklar, öncelikli aksiyon önerileri ve sektörel karşılaştırma içerir. Tam Değerlendirme'de uzman görüşmesi de eklenir."
          }
