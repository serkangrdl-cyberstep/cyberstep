<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-badge" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    <linearGradient id="bg-badge" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F2040"/>
      <stop offset="100%" stop-color="#060D1A"/>
    </linearGradient>
    <filter id="glow-badge" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outer-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-badge)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="171" x2="512" y2="171" stroke="#0F2040" stroke-width="1"/>
  <line x1="0" y1="341" x2="512" y2="341" stroke="#0F2040" stroke-width="1"/>
  <line x1="171" y1="0" x2="171" y2="512" stroke="#0F2040" stroke-width="1"/>
  <line x1="341" y1="0" x2="341" y2="512" stroke="#0F2040" stroke-width="1"/>

  <!-- Shield (centered, ~320px) -->
  <path d="M256 52 L452 122 L452 284 C452 382 360 452 256 492 C152 452 60 382 60 284 L60 122 Z"
        fill="#0A1628" stroke="url(#grad-badge)" stroke-width="8"/>

  <!-- Inner shield rim -->
  <path d="M256 80 L424 142 L424 284 C424 366 344 428 256 462 C168 428 88 366 88 284 L88 142 Z"
        fill="none" stroke="#00C8FF" stroke-width="2" stroke-opacity="0.2"/>

  <!-- Circuit S path -->
  <g filter="url(#glow-badge)">
    <path d="M 186 330 L 186 284 L 238 284 L 238 240 L 186 240 L 186 192 L 326 192 L 326 240 L 274 240 L 274 284 L 326 284 L 326 330 Z"
          fill="url(#grad-badge)" fill-opacity="0.95"/>
    <circle cx="186" cy="192" r="16" fill="#00C8FF"/>
    <circle cx="326" cy="192" r="16" fill="#00C8FF"/>
    <circle cx="186" cy="330" r="16" fill="#00C8FF"/>
    <circle cx="326" cy="330" r="16" fill="#00C8FF"/>
    <!-- Side circuit lines -->
    <line x1="88" y1="240" x2="162" y2="240" stroke="#00C8FF" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="350" y1="284" x2="424" y2="284" stroke="#00C8FF" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- Bottom glow arc -->
  <path d="M256 480 C174 454 92 388 88 296" stroke="#00C8FF" stroke-width="4" stroke-opacity="0.15" fill="none" stroke-linecap="round"/>

  <!-- Outer cyan glow ring -->
  <rect x="1" y="1" width="510" height="510" rx="112" fill="none" stroke="#00C8FF" stroke-width="1" stroke-opacity="0.12"/>
</svg>
