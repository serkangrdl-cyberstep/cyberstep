<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step AI — İlk Tarama Tamamlandı</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #060D1A;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  /* ── SCENE WRAPPER ── */
  .scene {
    position: relative;
    width: 480px;
    height: 620px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── BACKGROUND PULSE RINGS ── */
  .bg-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid #00C8FF;
    opacity: 0;
    animation: ringPulse 2.4s ease-out infinite;
  }
  .bg-ring:nth-child(1) { width:200px; height:200px; animation-delay:0s; }
  .bg-ring:nth-child(2) { width:320px; height:320px; animation-delay:0.5s; }
  .bg-ring:nth-child(3) { width:440px; height:440px; animation-delay:1s; }
  @keyframes ringPulse {
    0%   { opacity:0; transform:scale(0.5); }
    30%  { opacity:0.35; }
    100% { opacity:0; transform:scale(1.15); }
  }

  /* ── CAMERA FLASH ── */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    animation: flash 0.4s ease-out 1.8s;
  }
  @keyframes flash {
    0%   { opacity:0; }
    15%  { opacity:0.92; }
    100% { opacity:0; }
  }

  /* ── MASCOT ── */
  .mascot-wrap {
    position: relative;
    animation: mascotBounceIn 0.7s cubic-bezier(.34,1.56,.64,1) 0.3s both;
  }
  @keyframes mascotBounceIn {
    from { opacity:0; transform:scale(0.4) translateY(60px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .mascot-svg {
    width: 200px;
    height: 250px;
    animation: mascotFloat 3s ease-in-out 1.2s infinite;
    filter: drop-shadow(0 0 18px rgba(0,200,255,0.35));
  }
  @keyframes mascotFloat {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }

  /* Selfie arm pose animation */
  .arm-selfie {
    animation: armRaise 0.5s cubic-bezier(.34,1.56,.64,1) 1.0s both;
    transform-origin: 85% 45%;
  }
  @keyframes armRaise {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-35deg); }
  }

  /* Eye wink */
  .eye-right-lid {
    animation: wink 0.3s ease 2.1s both;
    transform-origin: center;
  }
  @keyframes wink {
    0%   { transform: scaleY(1); }
    40%  { transform: scaleY(0.05); }
    70%  { transform: scaleY(0.05); }
    100% { transform: scaleY(1); }
  }

  /* ── SELFIE PHONE ── */
  .phone {
    position: absolute;
    top: -30px;
    right: -52px;
    width: 52px;
    height: 78px;
    background: linear-gradient(135deg, #1a2a3a, #0a1520);
    border-radius: 8px;
    border: 2px solid #00C8FF;
    box-shadow: 0 0 12px rgba(0,200,255,0.4);
    animation: phoneAppear 0.4s cubic-bezier(.34,1.56,.64,1) 1.0s both;
    overflow: hidden;
  }
  @keyframes phoneAppear {
    from { opacity:0; transform:scale(0) rotate(20deg); }
    to   { opacity:1; transform:scale(1) rotate(0deg); }
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0a1828, #060D1A);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
    overflow: hidden;
  }
  .phone-selfie-preview {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: screenFlash 0.15s ease 2.0s;
  }
  @keyframes screenFlash {
    0%  { background: rgba(255,255,255,0.95); }
    100%{ background: transparent; }
  }
  .phone-lens {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: #222;
    border-radius: 50%;
    border: 1.5px solid #444;
  }
  .camera-icon {
    font-size: 13px;
    animation: camPulse 1s ease-in-out 1.2s infinite;
  }
  @keyframes camPulse {
    0%,100% { opacity:1; }
    50%      { opacity:0.5; }
  }

  /* ── COUNTDOWN ── */
  .countdown {
    position: absolute;
    top: -55px;
    right: -65px;
    font-size: 36px;
    font-weight: 900;
    color: #F5A623;
    text-shadow: 0 0 20px rgba(245,166,35,0.8);
    animation: countAnim 1.5s ease forwards 0.6s;
    opacity: 0;
  }
  @keyframes countAnim {
    0%   { opacity:1; content:"3"; transform:scale(1.4); }
    30%  { opacity:1; transform:scale(1); }
    65%  { opacity:1; }
    100% { opacity:0; transform:scale(0.5); }
  }

  /* ── SPARKLES AROUND MASCOT ── */
  .sparkle {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    animation: sparkleFloat 2s ease-out infinite;
  }
  .sparkle:nth-child(1)  { top:-20px; left:10px;  animation-delay:2.3s; }
  .sparkle:nth-child(2)  { top:0px;   right:-5px;  animation-delay:2.6s; }
  .sparkle:nth-child(3)  { top:40px;  left:-25px;  animation-delay:2.8s; }
  .sparkle:nth-child(4)  { top:20px;  right:-30px; animation-delay:2.5s; }
  .sparkle:nth-child(5)  { top:-30px; right:30px;  animation-delay:3.0s; }
  @keyframes sparkleFloat {
    0%   { opacity:0; transform:scale(0.5) translateY(0); }
    40%  { opacity:1; transform:scale(1.2) translateY(-12px); }
    100% { opacity:0; transform:scale(0.8) translateY(-28px); }
  }

  /* ── PHOTO RESULT CARD ── */
  .photo-card {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%) translateY(0) rotate(-2deg);
    width: 160px;
    background: white;
    border-radius: 8px;
    padding: 8px 8px 28px 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
    animation: photoSlideIn 0.5s cubic-bezier(.34,1.56,.64,1) 2.4s both;
    z-index: 10;
  }
  @keyframes photoSlideIn {
    from { opacity:0; transform:translateX(-50%) translateY(40px) rotate(-2deg) scale(0.7); }
    to   { opacity:1; transform:translateX(-50%) translateY(0) rotate(-2deg) scale(1); }
  }
  .photo-inner {
    background: linear-gradient(135deg, #091520, #0D2035);
    border-radius: 5px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    position: relative;
    overflow: hidden;
  }
  .photo-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,200,255,0.08), transparent);
  }
  .photo-caption {
    text-align: center;
    font-size: 8px;
    color: #666;
    margin-top: 6px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.5px;
  }
  .photo-caption strong {
    display: block;
    font-size: 9px;
    color: #333;
    margin-bottom: 1px;
  }

  /* ── MESSAGE BUBBLE ── */
  .message-wrap {
    position: relative;
    margin-top: 16px;
    animation: msgSlideUp 0.6s cubic-bezier(.34,1.56,.64,1) 2.8s both;
    z-index: 20;
  }
  @keyframes msgSlideUp {
    from { opacity:0; transform:translateY(24px) scale(0.9); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .message-box {
    background: linear-gradient(135deg, #0D2035, #091520);
    border: 1.5px solid #00C8FF;
    border-radius: 16px;
    padding: 16px 22px;
    max-width: 340px;
    text-align: center;
    position: relative;
    box-shadow: 0 0 24px rgba(0,200,255,0.15), inset 0 0 20px rgba(0,200,255,0.03);
  }
  .message-box::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 9px solid #00C8FF;
  }
  .message-box::after {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 7px solid #091520;
  }
  .msg-title {
    font-size: 17px;
    font-weight: 800;
    color: #E8EDF5;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .msg-title span { color: #00C8FF; }
  .msg-sub {
    font-size: 12px;
    color: #8896A8;
    line-height: 1.5;
  }
  .msg-badge {
    display: inline-block;
    margin-top: 10px;
    background: rgba(0,200,255,0.12);
    border: 1px solid rgba(0,200,255,0.35);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: 700;
    color: #00C8FF;
    letter-spacing: 1px;
  }

  /* ── SCAN LINE EFFECT ── */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00C8FF, transparent);
    opacity: 0;
    animation: scanDown 1.2s ease-in-out 0.5s;
    z-index: 5;
  }
  @keyframes scanDown {
    0%   { top:0%;    opacity:0.8; }
    100% { top:100%;  opacity:0; }
  }

  /* ── CONFETTI DOTS ── */
  .confetti {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0%   { opacity:1; transform:translateY(0) rotate(0deg); }
    100% { opacity:0; transform:translateY(180px) rotate(360deg); }
  }

  /* ── FOOTER ── */
  .footer-brand {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #1A3050;
    letter-spacing: 2px;
    white-space: nowrap;
    animation: fadeIn 1s ease 3.5s both;
    opacity: 0;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="flash-overlay"></div>

<div class="scene">
  <!-- bg rings -->
  <div class="bg-ring"></div>
  <div class="bg-ring"></div>
  <div class="bg-ring"></div>

  <!-- scan line -->
  <div class="scan-line"></div>

  <!-- mascot -->
  <div class="mascot-wrap">

    <!-- sparkles (appear after flash) -->
    <div class="sparkle">✨</div>
    <div class="sparkle">⭐</div>
    <div class="sparkle">💫</div>
    <div class="sparkle">✨</div>
    <div class="sparkle">⭐</div>

    <!-- phone held up -->
    <div class="phone">
      <div class="phone-screen">
        <div class="phone-lens"></div>
        <div class="phone-selfie-preview">
          <span class="camera-icon">📷</span>
        </div>
      </div>
    </div>

    <!-- countdown -->
    <div class="countdown">3</div>

    <!-- Step AI SVG mascot — selfie pose (arm up) -->
    <svg class="mascot-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
      <defs>
        <radialGradient id="bG" cx="42%" cy="32%" r="62%">
          <stop offset="0%" stop-color="#1A4A6B"/>
          <stop offset="100%" stop-color="#060D1A"/>
        </radialGradient>
        <radialGradient id="eG" cx="38%" cy="30%" r="58%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="55%" stop-color="#00C8FF"/>
          <stop offset="100%" stop-color="#0066AA"/>
        </radialGradient>
        <radialGradient id="sG" cx="50%" cy="28%" r="70%">
          <stop offset="0%" stop-color="#F5C842"/>
          <stop offset="100%" stop-color="#C47800"/>
        </radialGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00C8FF" flood-opacity="0.25"/></filter>
        <filter id="sg2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- shadow -->
      <ellipse cx="200" cy="478" rx="85" ry="13" fill="#00C8FF" opacity="0.1"/>
      <!-- legs -->
      <rect x="140" y="395" width="36" height="50" rx="18" fill="url(#bG)" stroke="#00C8FF" stroke-width="2"/>
      <ellipse cx="144" cy="447" rx="26" ry="11" fill="#0A1E30" stroke="#00C8FF" stroke-width="1.5"/>
      <rect x="224" y="395" width="36" height="50" rx="18" fill="url(#bG)" stroke="#00C8FF" stroke-width="2"/>
      <ellipse cx="256" cy="447" rx="26" ry="11" fill="#0A1E30" stroke="#00C8FF" stroke-width="1.5"/>
      <!-- right arm neutral -->
      <path d="M275 255 Q326 262 336 298 Q342 322 324 330 Q306 336 296 312 Q288 292 276 272" fill="url(#bG)" stroke="#00C8FF" stroke-width="2.5"/>
      <circle cx="330" cy="336" r="21" fill="url(#bG)" stroke="#00C8FF" stroke-width="2"/>
      <circle cx="348" cy="324" r="9" fill="#0D2535" stroke="#00C8FF" stroke-width="1.5"/>
      <circle cx="350" cy="339" r="9" fill="#0D2535" stroke="#00C8FF" stroke-width="1.5"/>
      <!-- left arm raised (selfie) — animated -->
      <g class="arm-selfie">
        <path d="M125 252 Q80 228 65 185 Q55 155 76 148 Q97 140 108 167 Q118 188 126 218" fill="url(#bG)" stroke="#00C8FF" stroke-width="2.5"/>
        <circle cx="58" cy="142" r="22" fill="url(#bG)" stroke="#F5A623" stroke-width="2.5"/>
        <!-- fingers spread for holding phone -->
        <circle cx="40" cy="130" r="9" fill="#0D2535" stroke="#F5A623" stroke-width="1.5"/>
        <circle cx="42" cy="115" r="8" fill="#0D2535" stroke="#F5A623" stroke-width="1.5"/>
        <circle cx="54" cy="110" r="8" fill="#0D2535" stroke="#F5A623" stroke-width="1.5"/>
        <circle cx="66" cy="113" r="8" fill="#0D2535" stroke="#F5A623" stroke-width="1.5"/>
        <circle cx="72" cy="126" r="8" fill="#0D2535" stroke="#F5A623" stroke-width="1.5"/>
      </g>
      <!-- body -->
      <rect x="110" y="188" width="180" height="215" rx="60" fill="url(#bG)" stroke="#00C8FF" stroke-width="2.5" filter="url(#sh)"/>
      <!-- belly screen -->
      <rect x="138" y="268" width="124" height="88" rx="16" fill="#091520" stroke="#00C8FF" stroke-width="1.5"/>
      <line x1="152" y1="286" x2="248" y2="286" stroke="#00C8FF" stroke-width="1" opacity="0.4"/>
      <line x1="152" y1="299" x2="232" y2="299" stroke="#00C8FF" stroke-width="1" opacity="0.3"/>
      <line x1="152" y1="312" x2="240" y2="312" stroke="#00C8FF" stroke-width="1" opacity="0.4"/>
      <!-- scan complete indicator -->
      <circle cx="200" cy="330" r="14" fill="rgba(46,204,113,0.15)" stroke="#2ECC71" stroke-width="2"/>
      <text x="200" y="335" font-family="Arial Black" font-size="14" fill="#2ECC71" text-anchor="middle">✓</text>
      <!-- chest shield -->
      <g transform="translate(174,223)">
        <path d="M26 0 Q46 7 46 7 L46 28 Q46 44 26 53 Q6 44 6 28 L6 7Z" fill="url(#sG)" stroke="#FFF8E0" stroke-width="1.5"/>
        <text x="26" y="36" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="#060D1A" text-anchor="middle">S</text>
      </g>
      <!-- antenna -->
      <line x1="200" y1="56" x2="200" y2="26" stroke="#00C8FF" stroke-width="3" stroke-linecap="round"/>
      <circle cx="200" cy="18" r="10" fill="#F5A623" stroke="#FFF8E0" stroke-width="1.5" filter="url(#sg2)"/>
      <circle cx="200" cy="18" r="16" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0.35"/>
      <circle cx="200" cy="18" r="22" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.15"/>
      <!-- ears -->
      <circle cx="96" cy="160" r="14" fill="#0A1E30" stroke="#00C8FF" stroke-width="2"/>
      <circle cx="96" cy="160" r="7" fill="#00C8FF" opacity="0.6"/>
      <circle cx="304" cy="160" r="14" fill="#0A1E30" stroke="#00C8FF" stroke-width="2"/>
      <circle cx="304" cy="160" r="7" fill="#00C8FF" opacity="0.6"/>
      <!-- head -->
      <circle cx="200" cy="165" r="106" fill="url(#bG)" stroke="#00C8FF" stroke-width="2.5" filter="url(#sh)"/>
      <!-- eyebrow happy -->
      <path d="M133 118 Q163 104 192 116" fill="none" stroke="#00C8FF" stroke-width="4" stroke-linecap="round"/>
      <path d="M208 116 Q237 104 266 118" fill="none" stroke="#00C8FF" stroke-width="4" stroke-linecap="round"/>
      <!-- left eye open -->
      <circle cx="163" cy="158" r="34" fill="#081828" stroke="#00C8FF" stroke-width="2"/>
      <circle cx="163" cy="158" r="23" fill="url(#eG)" filter="url(#gl)"/>
      <circle cx="165" cy="156" r="11" fill="#002A3D"/>
      <circle cx="171" cy="150" r="5" fill="white" opacity="0.92"/>
      <circle cx="161" cy="160" r="2.5" fill="white" opacity="0.5"/>
      <!-- right eye — wink animated -->
      <circle cx="237" cy="158" r="34" fill="#081828" stroke="#00C8FF" stroke-width="2"/>
      <g class="eye-right-lid">
        <circle cx="237" cy="158" r="23" fill="url(#eG)" filter="url(#gl)"/>
        <circle cx="239" cy="156" r="11" fill="#002A3D"/>
        <circle cx="245" cy="150" r="5" fill="white" opacity="0.92"/>
      </g>
      <!-- big smile -->
      <path d="M158 198 Q200 226 242 198" fill="none" stroke="#2ECC71" stroke-width="5" stroke-linecap="round"/>
      <!-- cheek blush -->
      <ellipse cx="140" cy="192" rx="15" ry="8" fill="#2ECC71" opacity="0.22"/>
      <ellipse cx="260" cy="192" rx="15" ry="8" fill="#2ECC71" opacity="0.22"/>
    </svg>

    <!-- polaroid photo result -->
    <div class="photo-card">
      <div class="photo-inner">🤖</div>
      <div class="photo-caption">
        <strong>STEP AI · GÜVENLİK TARAMASI</strong>
        2026-06-14 · cyberstep.io
      </div>
    </div>

  </div><!-- /mascot-wrap -->

  <!-- message bubble -->
  <div class="message-wrap">
    <div class="message-box">
      <div class="msg-title">
        Tebrikler! <span>İlk güvenlik fotoğrafınız</span> çekildi 📸
      </div>
      <div class="msg-sub">
        Alan adınızın güvenlik durumu kayıt altına alındı.<br>
        Raporunuz hazırlanıyor…
      </div>
      <div class="msg-badge">GÜVENLİK TARAMASI TAMAMLANDI</div>
    </div>
  </div>

  <div class="footer-brand">CYBERSTEP.IO · POWERED BY STEP AI</div>
</div>

<script>
// Confetti burst after flash
setTimeout(() => {
  const colors = ['#00C8FF','#F5A623','#2ECC71','#9B59B6','#E03A3A'];
  const scene = document.querySelector('.scene');
  for (let i = 0; i < 28; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.cssText = `
      left: ${30 + Math.random()*40}%;
      top: ${15 + Math.random()*30}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4+Math.random()*6}px;
      height: ${4+Math.random()*6}px;
      border-radius: ${Math.random()>0.5?'50%':'3px'};
      animation-delay: ${2.05 + Math.random()*0.4}s;
      animation-duration: ${0.9 + Math.random()*0.6}s;
    `;
    scene.appendChild(c);
  }
}, 100);

// Countdown: cycle 3→2→1
const cd = document.querySelector('.countdown');
const nums = ['3','2','1','📸'];
let ni = 0;
setTimeout(() => {
  const iv = setInterval(() => {
    if (ni < nums.length) {
      cd.textContent = nums[ni++];
      cd.style.animation = 'none';
      cd.offsetHeight; // reflow
      cd.style.animation = '';
      cd.style.opacity = '1';
    } else {
      clearInterval(iv);
      cd.style.opacity = '0';
    }
  }, 380);
}, 650);
</script>
</body>
</html>
